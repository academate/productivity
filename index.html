    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&display=swap');        /* .underline-box {

        .quote-box {
            width: 90%;
            margin: 15px auto;
            padding: 7px 15px;
            border-left: 5px solid var(--primary-white);
            text-align: justify;
        }

        .quote-box b {
            letter-spacing: 1.3px;
        }

        .slider {
            display: flex;
            overflow-x: auto;
            width: 90%;
            margin: 0px auto; /* was 35px for top and bottom */
            padding: 50px 20px;
            background: var(--main-black);
        }

        .slider::-webkit-scrollbar {
            display: none;
            /* background: #f0f0f0; */
        }

        .slider-box {
            /* width: 190px;
            height: 254px; */
            min-width: 270px;
            max-width: 275px;
            height: 350px;
            margin-right: 40px;
            margin-bottom: 20px; /*changes here*/
            display: grid;
            place-items: center;
            text-align: center;
            border-radius: 30px;
            background: #212121;
            box-shadow: 15px 15px 30px rgb(60, 60, 60);
            font-family: 'Lobster', cursive;
            font-size: 25px;
        }

        /* .slider-box-caption {
            margin-top: 100px;
        } */

        /* .slider-box-underline {
            width: 200px;
            height: 5px;
            background: var(--tertiary);
            border-radius: 5px;
        } */

        .other-productivity-links {
            width: 95%;
            margin: 25px auto 25px auto;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            flex-wrap: wrap;
        }

        .book-box {
            width: 300px;
            padding: 10px 10px;
            text-align: center;
            margin-bottom: 15px;
            color: var(--primary-white);
            border: 3px solid var(--primary-white);
            font-family: 'Special Elite', cursive;
            line-height: 22px;
            letter-spacing: 1.2px;
        }

        .book-box:hover {
            background-color: var(--primary-white);
            color: var(--main-black);
            font-weight: bold;
        }

        /* .author-name {
            font-family: 'Special Elite', cursive;
        } */

        @media (min-width: 1000px) {
            .quote-box {
                width: 85%;
            }
        }

        @media (min-width: 786px) {
            .slider {
                justify-content: space-evenly;
                align-items: center;
                flex-wrap: wrap;
            }

            .box {
                margin-bottom: 15px;
                margin-right: 0px;
            }
        }

        @media (max-width: 786px) {
            .quote-box {
                max-width: 85%;
            }

            .slider-box:nth-child(5) {
                margin-right: 0px;
            }
        }
